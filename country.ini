; 国内直连（默认直连，也可以切换到节点）
custom_proxy_group=国内`select`[]DIRECT`[]国外`[]自动选择`[]香港`[]台湾`[]日本`[]新加坡`[]美国

; AI 常用工具（如 OpenAI / ChatGPT，默认不包含香港节点以防报错）
