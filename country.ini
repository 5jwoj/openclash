; Version: 1.1.0
;========================
; 主策略组
;========================

; 默认代理与全局延迟最低自动测速
custom_proxy_group=国外`select`[]自动选择`[]香港`[]台湾`[]日本`[]新加坡`[]韩国`[]美国`[]其他国家`[]DIRECT`[]REJECT
